<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>1000 Words</title>
    <script>
      // SPA redirect: GitHub Pages serves this 404.html for any unmatched path.
      // Re-encodes the path into a query param so index.html can restore it.
      // pathSegmentsToKeep=1 preserves the repo name prefix (e.g. /1000-words).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
