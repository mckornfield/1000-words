<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 640 260"
  width="640"
  height="260"
  role="img"
  aria-label="Placeholder image"
>
  <defs>
    <linearGradient id="accent-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#808080" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#808080" stop-opacity="0.25" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#808080" stroke-width="0.35" stroke-opacity="0.2" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="640" height="260" rx="12" fill="#808080" fill-opacity="0.08" />
  <rect width="640" height="260" rx="12" fill="url(#grid)" />

  <!-- Outer border -->
  <rect x="1" y="1" width="638" height="258" rx="11.5" fill="none" stroke="#808080" stroke-opacity="0.25" stroke-width="1" />

  <!-- Left card block -->
  <rect x="24" y="24" width="192" height="212" rx="8" fill="#808080" fill-opacity="0.1" stroke="#808080" stroke-opacity="0.2" stroke-width="1" />
  <!-- Avatar circle stub -->
  <circle cx="120" cy="88" r="32" fill="#808080" fill-opacity="0.22" />
  <!-- Name line stubs -->
  <rect x="72" y="130" width="96" height="10" rx="3" fill="#808080" fill-opacity="0.2" />
  <rect x="88" y="148" width="64" height="8" rx="3" fill="#808080" fill-opacity="0.14" />
  <!-- Stat row stubs -->
  <rect x="40" y="176" width="44" height="8" rx="3" fill="#808080" fill-opacity="0.18" />
  <rect x="92" y="176" width="44" height="8" rx="3" fill="#808080" fill-opacity="0.18" />
  <rect x="144" y="176" width="44" height="8" rx="3" fill="#808080" fill-opacity="0.18" />

  <!-- Top-right wide card -->
  <rect x="232" y="24" width="384" height="64" rx="8" fill="#808080" fill-opacity="0.1" stroke="#808080" stroke-opacity="0.2" stroke-width="1" />
  <!-- Progress bar track -->
  <rect x="252" y="52" width="344" height="8" rx="4" fill="#808080" fill-opacity="0.15" />
  <!-- Progress bar fill -->
  <rect x="252" y="52" width="210" height="8" rx="4" fill="url(#accent-bar)" />
  <!-- Label stubs -->
  <rect x="252" y="36" width="80" height="9" rx="3" fill="#808080" fill-opacity="0.2" />
  <rect x="516" y="36" width="80" height="9" rx="3" fill="#808080" fill-opacity="0.14" />

  <!-- Middle-right card -->
  <rect x="232" y="104" width="184" height="132" rx="8" fill="#808080" fill-opacity="0.1" stroke="#808080" stroke-opacity="0.2" stroke-width="1" />
  <rect x="252" y="124" width="100" height="9" rx="3" fill="#808080" fill-opacity="0.22" />
  <rect x="252" y="141" width="144" height="7" rx="3" fill="#808080" fill-opacity="0.14" />
  <rect x="252" y="156" width="120" height="7" rx="3" fill="#808080" fill-opacity="0.14" />
  <rect x="252" y="171" width="130" height="7" rx="3" fill="#808080" fill-opacity="0.14" />
  <rect x="252" y="186" width="90" height="7" rx="3" fill="#808080" fill-opacity="0.14" />

  <!-- Bottom-right card A -->
  <rect x="432" y="104" width="184" height="62" rx="8" fill="#808080" fill-opacity="0.1" stroke="#808080" stroke-opacity="0.2" stroke-width="1" />
  <rect x="452" y="122" width="72" height="9" rx="3" fill="#808080" fill-opacity="0.22" />
  <rect x="452" y="139" width="120" height="7" rx="3" fill="#808080" fill-opacity="0.14" />

  <!-- Bottom-right card B -->
  <rect x="432" y="174" width="184" height="62" rx="8" fill="#808080" fill-opacity="0.1" stroke="#808080" stroke-opacity="0.2" stroke-width="1" />
  <rect x="452" y="192" width="72" height="9" rx="3" fill="#808080" fill-opacity="0.22" />
  <rect x="452" y="209" width="100" height="7" rx="3" fill="#808080" fill-opacity="0.14" />

  <!-- PLACEHOLDER label -->
  <text
    x="320"
    y="138"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="600"
    letter-spacing="4"
    fill="#808080"
    fill-opacity="0.55"
  >PLACEHOLDER</text>
</svg>
